<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../images/YouTube%20Profile%20Picture.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Systems | Itz_FloppyFish</title>
<meta name="description" content="Browse all Roblox development systems by Itz_FloppyFish. Free tutorial versions and premium production-ready builds.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<style>
.ffphero{padding:140px 24px 56px;text-align:center;}
.ffphero h1{font-size:clamp(36px,5vw,60px);font-weight:900;letter-spacing:-2px;margin-bottom:12px;}
.ffphero p{color:var(--t2);font-size:16px;}

.ffmkt{padding:0 24px 80px;max-width:1200px;margin:0 auto;}
.ffmkt-ctrl{background:var(--s);border:1px solid var(--br);border-radius:16px;padding:20px;margin-bottom:32px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
.ffmkt-sb{flex:1;min-width:200px;position:relative;}
.ffmkt-sb input{width:100%;background:var(--b3);border:1px solid rgba(40,120,255,0.18);border-radius:10px;padding:10px 16px 10px 40px;color:var(--tx);font-size:14px;font-family:var(--f);outline:none;}
.ffmkt-sb input::placeholder{color:var(--t3);}
.ffmkt-sb input:focus{border-color:rgba(40,120,255,0.4);}
.ffmkt-si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);}
.ffmkt-ft{display:flex;gap:6px;flex-wrap:wrap;}
.ffftab{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(40,120,255,0.18);background:var(--b3);color:var(--t2);font-family:var(--f);transition:all 0.2s;}
.ffftab:hover{border-color:rgba(40,120,255,0.38);color:var(--tx);}
.ffftab.on{background:var(--bl);border-color:var(--bl);color:#fff;box-shadow:0 4px 14px rgba(40,120,255,0.35);}
.ff-empty{grid-column:1/-1;text-align:center;padding:60px;color:var(--t3);}
</style>
</head>
<body>
<div class="ff-grid-bg"></div>
<canvas id="ff-cv"></canvas>
<div class="ff-wrap-inner">

<!-- NAV -->
<nav class="ffnav" id="ffnav">
  <div class="ffnav-i">
    <a href="/" class="fflogo">
      <img src="../images/YouTube%20Profile%20Picture.png" class="fflogo-img" alt="Itz_FloppyFish" onerror="this.style.display='none';document.getElementById('fflf').style.display='flex'">
      <div class="fflogo-fb" id="fflf">FF</div>
      <span class="fflogo-txt">Itz_FloppyFish</span>
    </a>
    <div class="ffnav-links">
      <a class="ffnl" href="/">Home</a>
      <a class="ffnl on" href="/systems/">Systems</a>
      <a class="ffnl" href="/about/">About</a>
      <a class="ffnl" href="/contact/">Contact</a>
    </div>
    <div class="ffnav-r">
      <a href="https://payhip.com/auth/login" target="_blank" class="ff-ibtn" title="My Downloads">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
      </a>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="ffphero">
  <h1>Roblox Systems <span style="background:linear-gradient(135deg,#2878ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Marketplace</span></h1>
  <p>Browse all systems. Free tutorial versions or premium production builds.</p>
</div>

<!-- MARKETPLACE -->
<div class="ffmkt">
  <div class="ffmkt-ctrl">
    <div class="ffmkt-sb">
      <span class="ffmkt-si">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
      <input type="text" id="ffms" placeholder="Search systems..." oninput="ffMR()">
    </div>
    <div class="ffmkt-ft">
      <button class="ffftab on" data-f="All" onclick="ffSF(this,'All')">All</button>
      <button class="ffftab" data-f="Free" onclick="ffSF(this,'Free')">Free</button>
      <button class="ffftab" data-f="Premium" onclick="ffSF(this,'Premium')">Premium</button>
    </div>
  </div>
  <div class="ff-cg" id="ffas"></div>
</div>

<!-- FOOTER -->
<footer class="ffoot">
  <div class="ffoot-bottom-bar">
    <div class="ffoot-bot-left">
      <span>&#169; 2026 Itz_FloppyFish. All rights reserved.</span>
      <span class="ffoot-sep">&#183;</span>
      <span>Not affiliated with Roblox Corporation.</span>
    </div>
    <div class="ffoot-bot-right">v3.0.0</div>
  </div>
</footer>

</div>
<script src="/js/main.js"></script>
<script>
// SYSTEMS DATA - add new products here
const SYSTEMS=[
  {
    name:"Item Shop System",
    cat:"Economy",
    desc:"Full in-game shop with categories, item previews, buy confirmations, and transaction history.",
    href:"/systems/item-shop/",
    hasFree:true,
    hasPrem:true,
    pr:"$4.99",
    icon:"store"
  }
  // ADD MORE SYSTEMS HERE - just copy the block above
];

let filt='All';


// Inline icon set for product cards (add more as you add products)
const FFICONS={
  store:'<path d="M15 21v-5a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v5"/><path d="M17.774 10.31a1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.451 0 1.12 1.12 0 0 0-1.548 0 2.5 2.5 0 0 1-3.452 0 1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.77-3.248l2.889-4.184A2 2 0 0 1 7 2h10a2 2 0 0 1 1.653.873l2.895 4.192a2.5 2.5 0 0 1-3.774 3.244"/><path d="M4 10.95V19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8.05"/>',
  package:'<path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/><polyline points="3.29 7 12 12 20.71 7"/><path d="m7.5 4.27 9 5.15"/>',
  coins:'<circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/>',
  zap:'<path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>'
};
function ffIcon(name,sz){
  const p=FFICONS[name]||FFICONS.package;
  return '<svg class="ffic" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" style="width:'+sz+'px;height:'+sz+'px;" aria-hidden="true">'+p+'</svg>';
}

function ffCard(s){
  return`<a href="${s.href}" class="ff-card fffade">
    <div class="ff-ct">
      <div class="ff-ct-bg" style="background:linear-gradient(135deg,#0d1422,#162235)"></div>
      <div style="opacity:0.4;position:relative;z-index:1;color:var(--tx);">${ffIcon(s.icon,42)}</div>
      <div class="ff-ct-ov"></div>
    </div>
    <div class="ff-cb">
      <div class="ff-pills">
        <span class="ff-pill ff-pill-cat">${s.cat}</span>
        ${s.hasFree?'<span class="ff-pill ff-pill-free">Free</span>':''}
        ${s.hasPrem?'<span class="ff-pill ff-pill-prem"><svg class="ffic " xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;vertical-align:-2px;" aria-hidden="true"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z" /></svg> Premium</span>':''}
      </div>
      <div class="ff-cn">${s.name}</div>
      <div class="ff-cd">${s.desc}</div>
      <div class="ff-ca">
        <span class="ff-ca-btn ff-ca-view">View System &#8594;</span>
      </div>
    </div>
  </a>`;
}

function ffMR(){
  const q=(document.getElementById('ffms').value||'').toLowerCase();
  const r=SYSTEMS.filter(s=>{
    const mq=!q||s.name.toLowerCase().includes(q)||s.desc.toLowerCase().includes(q)||s.cat.toLowerCase().includes(q);
    const mf=filt==='All'||(filt==='Free'&&s.hasFree)||(filt==='Premium'&&s.hasPrem)||s.cat===filt;
    return mq&&mf;
  });
  const el=document.getElementById('ffas');
  el.innerHTML=r.length?r.map(ffCard).join(''):'<div class="ff-empty">No systems found for that filter.</div>';
  ffFI();
}

function ffSF(e,f){
  filt=f;
  document.querySelectorAll('.ffftab').forEach(t=>t.classList.remove('on'));
  e.classList.add('on');
  ffMR();
}

document.addEventListener('DOMContentLoaded',ffMR);
</script>
</body>
</html>
